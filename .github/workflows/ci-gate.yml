name: CI Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - xiexin-vite-proto

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Python compile check
        run: |
          python -m compileall orchestrator.py Backend apps

      - name: Backend import smoke check
        run: |
          python - <<'PY'
          from Backend.settings import get_settings
          from Backend.llm_provider import get_model_list

          settings = get_settings()
          models = get_model_list()
          assert isinstance(models, list) and len(models) > 0
          assert isinstance(settings.base_url, str) and settings.base_url
          print("backend smoke check passed")
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Front/react-ui/package-lock.json

      - name: Install frontend deps
        run: npm --prefix Front/react-ui ci

      - name: Build frontend dist
        run: npm --prefix Front/react-ui run build

      - name: Basic secret gate
        shell: bash
        run: |
          set -euo pipefail
          if git grep -nE 'sk-[A-Za-z0-9]{20,}' -- \
            ':!Docs/**'; then
            echo "::error::Potential secret detected in tracked files. Remove and rotate before merging."
            exit 1
          fi
          echo "secret gate passed"
