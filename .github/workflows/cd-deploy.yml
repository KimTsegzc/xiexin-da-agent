name: CD Deploy

on:
  push:
    branches:
      - main
      - xiexin-vite-proto
      - agent-dev-*
    tags:
      - "V*"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python package
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Backend regression tests
        run: python -m unittest discover -s tests -v

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: Front/react-ui/package-lock.json

      - name: Install frontend deps
        run: npm --prefix Front/react-ui ci

      - name: Build frontend dist
        run: npm --prefix Front/react-ui run build

      - name: Deploy to Tencent Cloud
        uses: appleboy/ssh-action@master
        env:
          SOURCE_REF: ${{ github.ref_name }}
          SOURCE_SHA: ${{ github.sha }}
        with:
          host: 81.71.25.120
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: SOURCE_REF,SOURCE_SHA
          script: |
            set -euo pipefail
            echo "[INFO] Starting deployment..."
            echo "[INFO] Deploying ref: ${SOURCE_REF}"
            echo "[INFO] Deploying sha: ${SOURCE_SHA}"

            APP_DIR="/srv/xiexin-da-agent"
            ARCHIVE_URL="https://cors.isteed.cc/https://codeload.github.com/KimTsegzc/xiexin-da-agent/zip/${SOURCE_SHA}"
            ARCHIVE_ZIP="/tmp/xiexin-da-agent-${SOURCE_SHA}.zip"
            ARCHIVE_DIR="/tmp/xiexin-da-agent-${SOURCE_SHA}"
            ENV_BACKUP="/tmp/xiexin-da-agent.env.bak"

            apt-get -o Acquire::ForceIPv4=true update
            apt-get install -y wget unzip rsync

            if [[ -f "$APP_DIR/.env" ]]; then
              cp -f "$APP_DIR/.env" "$ENV_BACKUP"
            fi

            rm -rf "$ARCHIVE_DIR" "$ARCHIVE_ZIP"
            wget -O "$ARCHIVE_ZIP" "$ARCHIVE_URL"
            unzip -q "$ARCHIVE_ZIP" -d /tmp

            EXTRACTED_DIR="$(find /tmp -maxdepth 1 -type d -name "xiexin-da-agent-*" | grep "${SOURCE_SHA}" | head -n 1 || true)"
            if [[ -z "$EXTRACTED_DIR" ]]; then
              echo "[FAIL] Unable to locate extracted archive directory for ${SOURCE_SHA}"
              exit 1
            fi

            rm -rf "$APP_DIR"
            mv "$EXTRACTED_DIR" "$APP_DIR"

            id -u xiexin >/dev/null 2>&1 || adduser --disabled-password --gecos "" xiexin

            if [[ -f "$ENV_BACKUP" ]]; then
              cp -f "$ENV_BACKUP" "$APP_DIR/.env"
            elif [[ -f "$APP_DIR/Deployer/env.production.example" ]]; then
              cp "$APP_DIR/Deployer/env.production.example" "$APP_DIR/.env"
            fi

            chown -R xiexin:xiexin "$APP_DIR"
            chmod 600 "$APP_DIR/.env" || true
            mkdir -p "$APP_DIR/.runtime"
            chown -R xiexin:xiexin "$APP_DIR/.runtime"

            cd "$APP_DIR"
            sudo -u xiexin -H bash -lc "cd '$APP_DIR' && SKIP_APT=1 bash Deployer/bootstrap_ubuntu.sh"

            cp "$APP_DIR/Deployer/systemd/xiexin-backend.service" /etc/systemd/system/xiexin-backend.service
            cp "$APP_DIR/Deployer/systemd/xiexin-frontend.service" /etc/systemd/system/xiexin-frontend.service

            PY_PATH="$(readlink -f "$APP_DIR/.venv311/bin/python" || true)"
            NPM_PATH="$(command -v npm || true)"
            if [[ -n "$PY_PATH" ]]; then
              sed -i "s|^ExecStart=.*orchestrator.py.*|ExecStart=${PY_PATH} ${APP_DIR}/orchestrator.py --serve --host 127.0.0.1 --port 8766|" /etc/systemd/system/xiexin-backend.service
            fi
            if [[ -n "$NPM_PATH" ]]; then
              sed -i "s|^ExecStart=.*npm.*|ExecStart=${NPM_PATH} run preview|" /etc/systemd/system/xiexin-frontend.service
            fi

            systemctl daemon-reload
            systemctl enable xiexin-backend xiexin-frontend >/dev/null 2>&1 || true
            systemctl restart xiexin-backend
            systemctl restart xiexin-frontend

            sleep 2
            if ! systemctl is-active --quiet xiexin-backend; then
              systemctl --no-pager --full status xiexin-backend || true
              journalctl -u xiexin-backend -n 120 --no-pager || true
              exit 1
            fi
            if ! systemctl is-active --quiet xiexin-frontend; then
              systemctl --no-pager --full status xiexin-frontend || true
              journalctl -u xiexin-frontend -n 120 --no-pager || true
              exit 1
            fi

            cp "$APP_DIR/Deployer/nginx/xiexin-da-agent.conf" /etc/nginx/sites-available/xiexin-da-agent
            ln -sf /etc/nginx/sites-available/xiexin-da-agent /etc/nginx/sites-enabled/xiexin-da-agent
            rm -f /etc/nginx/sites-enabled/default
            nginx -t
            systemctl enable nginx >/dev/null 2>&1 || true
            systemctl reload nginx || systemctl restart nginx

            sudo -u xiexin -H bash -lc "cd '$APP_DIR' && bash Deployer/healthcheck.sh"

            echo "[INFO] Deployment script completed"

      - name: Health Check
        run: |
          set -euo pipefail
          echo "[INFO] Waiting for services to be ready..."
          sleep 5
          
          for attempt in {1..30}; do
            echo "[INFO] Health check attempt $attempt/30"
            
            if curl -fsS http://81.71.25.120/health >/dev/null 2>&1; then
              echo "[PASS] Frontend health check passed"
              curl -fsS http://81.71.25.120/health
              exit 0
            fi
            
            sleep 2
          done
          
          echo "[FAIL] Health check failed after 30 attempts"
          exit 1

      - name: Deployment Notification
        if: success()
        run: |
          echo "[SUCCESS] Deployment completed successfully"
          echo "Access: http://81.71.25.120/"

      - name: Deployment Failed Notification
        if: failure()
        run: |
          echo "[FAILURE] Deployment failed"
          exit 1
