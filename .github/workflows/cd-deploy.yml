name: CD Deploy

on:
  push:
    branches:
      - main
      - xiexin-vite-proto
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Tencent Cloud
        uses: appleboy/ssh-action@master
        with:
          host: 81.71.25.120
          username: root
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            echo "[INFO] Starting deployment..."
            
            # Configure GitHub SSH key for root (for git operations)
            mkdir -p /root/.ssh
            chmod 700 /root/.ssh
            ssh-keyscan -t ed25519,rsa github.com >> /root/.ssh/known_hosts 2>/dev/null || true
            
            cd /srv/xiexin-da-agent || exit 1
            
            # 拉取最新代码并启动服务
            BRANCH=main GIT_URL=https://github.com/KimTsegzc/xiexin-da-agent.git bash Deployer/pull_and_start.sh
            
            echo "[INFO] Deployment script completed"

      - name: Health Check
        run: |
          set -euo pipefail
          echo "[INFO] Waiting for services to be ready..."
          sleep 5
          
          for attempt in {1..30}; do
            echo "[INFO] Health check attempt $attempt/30"
            
            if curl -fsS http://81.71.25.120/health >/dev/null 2>&1; then
              echo "[PASS] Frontend health check passed"
              curl -fsS http://81.71.25.120/health
              exit 0
            fi
            
            sleep 2
          done
          
          echo "[FAIL] Health check failed after 30 attempts"
          exit 1

      - name: Deployment Notification
        if: success()
        run: |
          echo "[SUCCESS] Deployment completed successfully"
          echo "Access: http://81.71.25.120/"

      - name: Deployment Failed Notification
        if: failure()
        run: |
          echo "[FAILURE] Deployment failed"
          exit 1
